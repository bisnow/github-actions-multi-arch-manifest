name: 'Create Multi-Architecture Manifest'
description: 'Creates and pushes multi-platform Docker manifests for amd64 and arm64 to Harbor and/or ECR'
inputs:
  image-tag:
    description: 'Image tag to create manifest for'
    required: true
  service-name:
    description: 'Name of service for location retrieve images in container repo'
    required: true
  business-unit:
    description: 'Business Unit of app for Harbor'
    required: true
  git-sha:
    description: 'Git SHA to create manifest for (defaults to github.sha)'
    required: false
    default: ''
  aws-account:
    description: 'AWS account name to assume role for'
    required: false
    default: 'bisnow'
  only-harbor:
    description: 'Skip ECR and only push manifests to Harbor'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Validate registry inputs
      shell: bash
      run: |
        if [ -z "${{ inputs.service-name }}" ]; then
          echo "❌ [multi-arch-manifest] Service name not provided. Cannot build manifest without service name."
          echo "🔎 Solution: Add 'service-name' field to the 'multi-arch-manifest' action."
          exit 1
        fi
        if [ -z "${{ inputs.business-unit }}" ]; then
          echo "❌ [multi-arch-manifest] business-unit not provided. Cannot pull from Harbor without business-unit."
          echo "🔎 Solution: Add 'business-unit' field to the 'multi-arch-manifest' action."
          exit 1
        fi

    - name: Set active registry
      id: registry
      shell: bash
      run: |
        echo "harbor_url=harbor.bisnow.cloud/${{ inputs.business-unit }}/${{ inputs.service-name }}" >> $GITHUB_OUTPUT
        echo "ecr_url=560285300220.dkr.ecr.us-east-1.amazonaws.com/${{ inputs.service-name }}" >> $GITHUB_OUTPUT

    - name: Checkout Repository
      uses: actions/checkout@v6

    - name: Login to Harbor
      shell: bash
      run: |
        if [ -f "$HOME/.docker/config.json" ]; then
          HARBOR_AUTH=$(cat "$HOME/.docker/config.json" | jq -r '.auths["harbor.bisnow.cloud"].auth' | base64 -d)
          HARBOR_USER="${HARBOR_AUTH%%:*}"
          HARBOR_PASS="${HARBOR_AUTH#*:}"
          echo "$HARBOR_PASS" | docker login harbor.bisnow.cloud -u "$HARBOR_USER" --password-stdin
        else
          echo "❌ No Docker config found at $HOME/.docker/config.json"
          echo "🔎 Ensure the runner has Harbor credentials configured."
          exit 1
        fi

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Assume role for AWS Account
      if: ${{ inputs.only-harbor != 'true' }}
      uses: bisnow/github-actions-assume-role-for-environment@main
      with:
        aws-account: ${{ inputs.aws-account }}

    - name: Login to Amazon ECR
      if: ${{ inputs.only-harbor != 'true' }}
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Re-login to Harbor
      if: ${{ inputs.only-harbor != 'true' }}
      shell: bash
      run: |
        HARBOR_AUTH=$(cat "$HOME/.docker/config.json" | jq -r '.auths["harbor.bisnow.cloud"].auth' | base64 -d)
        HARBOR_USER="${HARBOR_AUTH%%:*}"
        HARBOR_PASS="${HARBOR_AUTH#*:}"
        echo "$HARBOR_PASS" | docker login harbor.bisnow.cloud -u "$HARBOR_USER" --password-stdin

    - name: Verify Architecture Images Exist
      shell: bash
      run: |
        harbor_registry="${{ steps.registry.outputs.harbor_url }}"
        ecr_registry="${{ steps.registry.outputs.ecr_url }}"
        image_tag="${{ inputs.image-tag }}"
        git_sha="${{ inputs.git-sha }}"
        only_harbor="${{ inputs.only-harbor }}"

        if [ -z "$git_sha" ]; then
          git_sha="${{ github.sha }}"
        fi

        registries=("$harbor_registry")
        if [ "$only_harbor" != "true" ]; then
          registries+=("$ecr_registry")
        fi

        tags=("$image_tag" "$git_sha")
        archs=("amd64" "arm64")

        echo "🔍 Verifying all architecture images are available..."
        max_attempts=30
        attempt=0
        sleep_time=5

        while [ $attempt -lt $max_attempts ]; do
          all_found=true

          for registry in "${registries[@]}"; do
            for tag in "${tags[@]}"; do
              for arch in "${archs[@]}"; do
                image="$registry:$tag-$arch"
                if docker buildx imagetools inspect "$image" >/dev/null 2>&1; then
                  echo "✅ Found: $image"
                else
                  echo "⏳ Waiting for: $image"
                  all_found=false
                fi
              done
            done
          done

          if [ "$all_found" = true ]; then
            echo "✅ All architecture images are available!"
            exit 0
          fi

          attempt=$((attempt + 1))
          if [ $attempt -lt $max_attempts ]; then
            echo "⏳ Attempt $attempt/$max_attempts - waiting ${sleep_time}s before retry..."
            sleep $sleep_time
          fi
        done

        echo "❌ Timeout waiting for architecture images to be available"
        exit 1

    - name: Create Multi-Platform Manifests
      shell: bash
      run: |
        harbor_registry="${{ steps.registry.outputs.harbor_url }}"
        ecr_registry="${{ steps.registry.outputs.ecr_url }}"
        image_tag="${{ inputs.image-tag }}"
        git_sha="${{ inputs.git-sha }}"
        only_harbor="${{ inputs.only-harbor }}"

        if [ -z "$git_sha" ]; then
          git_sha="${{ github.sha }}"
        fi

        registries=("$harbor_registry")
        if [ "$only_harbor" != "true" ]; then
          registries+=("$ecr_registry")
        fi

        tags=("$image_tag" "$git_sha")

        for registry in "${registries[@]}"; do
          for tag in "${tags[@]}"; do
            echo "Creating multi-platform manifest for $registry:$tag..."
            crane index append \
              --tag "$registry:$tag" \
              --manifest "$registry:$tag-amd64" \
              --manifest "$registry:$tag-arm64" \
              --flatten
          done
        done

        echo "✅ Multi-platform manifests created successfully"

    - name: Verify Manifests Contains Both Architectures
      shell: bash
      run: |
        harbor_registry="${{ steps.registry.outputs.harbor_url }}"
        ecr_registry="${{ steps.registry.outputs.ecr_url }}"
        image_tag="${{ inputs.image-tag }}"
        git_sha="${{ inputs.git-sha }}"
        only_harbor="${{ inputs.only-harbor }}"

        if [ -z "$git_sha" ]; then
          git_sha="${{ github.sha }}"
        fi

        registries=("$harbor_registry")
        if [ "$only_harbor" != "true" ]; then
          registries+=("$ecr_registry")
        fi

        tags=("$image_tag" "$git_sha")

        for registry in "${registries[@]}"; do
          for tag in "${tags[@]}"; do
            echo "🔍 Verifying $registry:$tag contains both architectures..."
            manifest=$(docker buildx imagetools inspect "$registry:$tag")
            if echo "$manifest" | grep -q "linux/amd64" && echo "$manifest" | grep -q "linux/arm64"; then
              echo "✅ $registry:$tag verified - contains both linux/amd64 and linux/arm64"
            else
              echo "❌ $registry:$tag verification failed - missing one or both architectures"
              echo "$manifest"
              exit 1
            fi
          done

          tag_digest=$(docker buildx imagetools inspect "$registry:$image_tag" --raw | sha256sum | awk '{print $1}')
          sha_digest=$(docker buildx imagetools inspect "$registry:$git_sha" --raw | sha256sum | awk '{print $1}')
          if [ "$tag_digest" = "$sha_digest" ]; then
            echo "✅ Both tags point to the same manifest digest for $registry"
          else
            echo "⚠️ Warning: Tags point to different manifests for $registry"
            echo "Image tag digest: $tag_digest"
            echo "Git SHA digest: $sha_digest"
            exit 1
          fi
        done

        harbor_digest=$(docker buildx imagetools inspect "$harbor_registry:$image_tag" --raw | sha256sum | awk '{print $1}')

        echo ""
        echo "Summary:"
        echo "   Tags: $image_tag, $git_sha"
        echo "   Architectures: linux/amd64, linux/arm64"
        echo "   Harbor Digest: sha256:$harbor_digest"
        if [ "$only_harbor" != "true" ]; then
          ecr_digest=$(docker buildx imagetools inspect "$ecr_registry:$image_tag" --raw | sha256sum | awk '{print $1}')
          echo "   ECR Digest: sha256:$ecr_digest"
        fi

        echo "## Multi-Architecture Manifest Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| **Harbor Registry** | \`$harbor_registry\` |" >> $GITHUB_STEP_SUMMARY
        if [ "$only_harbor" != "true" ]; then
          echo "| **ECR Registry** | \`$ecr_registry\` |" >> $GITHUB_STEP_SUMMARY
        fi
        echo "| **Image Tag** | \`$image_tag\` |" >> $GITHUB_STEP_SUMMARY
        echo "| **Git SHA** | \`$git_sha\` |" >> $GITHUB_STEP_SUMMARY
        echo "| **Architectures** | \`linux/amd64\`, \`linux/arm64\` |" >> $GITHUB_STEP_SUMMARY
        echo "| **Harbor Manifest Digest** | \`sha256:$harbor_digest\` |" >> $GITHUB_STEP_SUMMARY
        if [ "$only_harbor" != "true" ]; then
          echo "| **ECR Manifest Digest** | \`sha256:$ecr_digest\` |" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Created Manifests" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        for registry in "${registries[@]}"; do
          for tag in "${tags[@]}"; do
            echo "- \`$registry:$tag\`" >> $GITHUB_STEP_SUMMARY
          done
        done
